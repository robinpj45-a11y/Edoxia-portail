<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 650" width="100%" height="100%">
  <defs>
    <style>
      /* Palette de couleurs exacte */
      .mint { fill: #80d1b9; }
      .coral { fill: #f7a399; }
      .mauve { fill: #a182c0; }
      .anthracite { fill: #2c2c3e; }
      .white { fill: #ffffff; }
      
      /* Styles de lignes */
      .outline { 
        stroke: #2c2c3e; 
        stroke-width: 6; 
        stroke-linecap: round; 
        stroke-linejoin: round; 
      }
      .circuit {
        stroke: #2c2c3e;
        stroke-width: 4;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }
      
      /* Typographie arrondie */
      .font-edoxia {
        font-family: 'Nunito', 'Varela Round', 'Quicksand', 'Arial Rounded MT Bold', sans-serif;
        font-weight: 800;
        font-size: 68px;
        letter-spacing: 1px;
      }

      /* Animations CSS */
      .book-hover {
        animation: floatBook 5s ease-in-out infinite;
        transform-origin: center;
      }

      @keyframes floatBook {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-12px); }
      }

      /* Système de particules complexes (Connaissance brute) */
      .particle {
        opacity: 0;
        transform-origin: center;
        animation: flyOut var(--dur) ease-out infinite var(--del);
      }

      @keyframes flyOut {
        0% { transform: translate(0, 0) scale(0) rotate(0deg); opacity: 0; }
        15% { opacity: 1; transform: translate(calc(var(--tx) * 0.15), calc(var(--ty) * 0.15)) scale(1.2) rotate(calc(var(--rot) * 0.15)); }
        80% { opacity: 0.8; }
        100% { transform: translate(var(--tx), var(--ty)) scale(0.3) rotate(var(--rot)); opacity: 0; }
      }
    </style>
  </defs>

  <!-- Fond (Optionnel, permet de détacher le logo sur fond sombre si besoin) -->
  <rect x="0" y="0" width="500" height="650" fill="#ffffff" rx="80" />

  <!-- GROUPE PRINCIPAL : LE LIVRE EN FLOTTAISON -->
  <g class="book-hover">
    
    <!-- Ombre sous le livre pour renforcer la lévitation -->
    <ellipse cx="250" cy="460" rx="140" ry="20" fill="#2c2c3e" opacity="0.1" />

    <!-- BLOC DES PAGES (Épaisseur du livre) -->
    <!-- Pages sous la couverture gauche -->
    <path d="M 235 385 L 75 315 L 75 335 L 235 405 Z" class="white outline" />
    <!-- Pages sous la couverture droite -->
    <path d="M 265 385 L 425 315 L 425 335 L 265 405 Z" class="white outline" />
    
    <!-- Lignes de détails pour l'épaisseur des pages -->
    <path d="M 75 325 L 235 395 M 425 325 L 265 395" class="circuit" stroke-width="2" />

    <!-- COUVERTURES EXTERNES -->
    <!-- Couverture Gauche (Menthe) -->
    <path d="M 235 410 L 60 330 L 60 130 L 235 220 Z" class="mint outline" />
    
    <!-- Couverture Droite (Corail) -->
    <path d="M 265 410 L 440 330 L 440 130 L 265 220 Z" class="coral outline" />

    <!-- TRANCHE DU LIVRE (Mauve) -->
    <path d="M 235 410 Q 250 430 265 410 L 265 220 Q 250 240 235 220 Z" class="mauve outline" />

    <!-- PAGES STATIQUES INTERNES (Haut du bloc) -->
    <!-- Page Gauche -->
    <path d="M 250 395 C 200 385 130 350 75 325 L 75 145 C 130 170 200 200 250 210 Z" class="white outline" />
    <!-- Page Droite -->
    <path d="M 250 395 C 300 385 370 350 425 325 L 425 145 C 370 170 300 200 250 210 Z" class="white outline" />

    <!-- ANIMATION DES PAGES QUI TOURNENT (Morphing SMIL) -->
    <!-- Page 1 -->
    <path class="white outline" d="M 250 395 C 300 385 370 350 425 325 L 425 145 C 370 170 300 200 250 210 Z">
      <animate attributeName="d" 
        values="
          M 250 395 C 300 385 370 350 425 325 L 425 145 C 370 170 300 200 250 210 Z;
          M 250 395 C 300 360 340 260 330 200 L 310 90 C 300 130 280 180 250 210 Z;
          M 250 395 C 265 310 240 210 230 130 L 250 70 C 255 130 260 170 250 210 Z;
          M 250 395 C 200 360 160 260 170 200 L 190 90 C 200 130 220 180 250 210 Z;
          M 250 395 C 200 385 130 350 75 325 L 75 145 C 130 170 200 200 250 210 Z;
          M 250 395 C 300 385 370 350 425 325 L 425 145 C 370 170 300 200 250 210 Z" 
        keyTimes="0; 0.2; 0.4; 0.6; 0.8; 1" 
        dur="3s" repeatCount="indefinite" begin="0s" />
      <animate attributeName="opacity" values="1;1;1;1;0;0;1" keyTimes="0;0.2;0.4;0.78;0.8;0.99;1" dur="3s" repeatCount="indefinite" begin="0s" />
    </path>

    <!-- Page 2 (Décalée de 1.5s pour un flux continu) -->
    <path class="white outline" d="M 250 395 C 300 385 370 350 425 325 L 425 145 C 370 170 300 200 250 210 Z">
      <animate attributeName="d" 
        values="
          M 250 395 C 300 385 370 350 425 325 L 425 145 C 370 170 300 200 250 210 Z;
          M 250 395 C 300 360 340 260 330 200 L 310 90 C 300 130 280 180 250 210 Z;
          M 250 395 C 265 310 240 210 230 130 L 250 70 C 255 130 260 170 250 210 Z;
          M 250 395 C 200 360 160 260 170 200 L 190 90 C 200 130 220 180 250 210 Z;
          M 250 395 C 200 385 130 350 75 325 L 75 145 C 130 170 200 200 250 210 Z;
          M 250 395 C 300 385 370 350 425 325 L 425 145 C 370 170 300 200 250 210 Z" 
        keyTimes="0; 0.2; 0.4; 0.6; 0.8; 1" 
        dur="3s" repeatCount="indefinite" begin="-1.5s" />
      <animate attributeName="opacity" values="1;1;1;1;0;0;1" keyTimes="0;0.2;0.4;0.78;0.8;0.99;1" dur="3s" repeatCount="indefinite" begin="-1.5s" />
    </path>

  </g> <!-- Fin du groupe flottant -->

  <!-- GEYSER DE CONNAISSANCE (Particules générées depuis le centre du livre) -->
  <g id="knowledge-explosion" transform="translate(250, 200)">
    
    <!-- Pixels Menthe -->
    <rect x="-8" y="-8" width="16" height="16" class="particle mint" style="--tx: -120px; --ty: -180px; --rot: 135deg; --dur: 3.5s; --del: 0.1s;" />
    <rect x="-6" y="-6" width="12" height="12" class="particle mint" style="--tx: 60px; --ty: -250px; --rot: -90deg; --dur: 4.2s; --del: 1.2s;" />
    <rect x="-10" y="-10" width="20" height="20" class="particle mint outline" style="--tx: 140px; --ty: -160px; --rot: 270deg; --dur: 3.8s; --del: 2.5s;" stroke-width="4"/>
    <rect x="-5" y="-5" width="10" height="10" class="particle mint" style="--tx: -30px; --ty: -320px; --rot: 45deg; --dur: 3.0s; --del: 0.8s;" />
    
    <!-- Pixels Mauve -->
    <rect x="-12" y="-12" width="24" height="24" class="particle mauve" style="--tx: 15px; --ty: -220px; --rot: 75deg; --dur: 4.5s; --del: 0.5s;" />
    <rect x="-7" y="-7" width="14" height="14" class="particle mauve outline" style="--tx: -150px; --ty: -120px; --rot: -45deg; --dur: 3.2s; --del: 1.8s;" stroke-width="4"/>
    <rect x="-9" y="-9" width="18" height="18" class="particle mauve" style="--tx: -80px; --ty: -280px; --rot: 180deg; --dur: 4.0s; --del: 0.3s;" />
    <rect x="-6" y="-6" width="12" height="12" class="particle mauve" style="--tx: 110px; --ty: -300px; --rot: 360deg; --dur: 3.7s; --del: 2.1s;" />

    <!-- Nodes Corail (Cercles) -->
    <circle cx="0" cy="0" r="10" class="particle coral" style="--tx: -60px; --ty: -150px; --rot: 0deg; --dur: 3.1s; --del: 0.9s;" />
    <circle cx="0" cy="0" r="14" class="particle coral" style="--tx: 90px; --ty: -180px; --rot: 0deg; --dur: 4.8s; --del: 2.2s;" />
    <circle cx="0" cy="0" r="8" class="particle coral outline" style="--tx: -130px; --ty: -260px; --rot: 0deg; --dur: 3.6s; --del: 0.4s;" stroke-width="4"/>
    <circle cx="0" cy="0" r="6" class="particle coral" style="--tx: 40px; --ty: -270px; --rot: 0deg; --dur: 3.3s; --del: 1.5s;" />

    <!-- Particules Data (Anthracite) -->
    <rect x="-7" y="-7" width="14" height="14" class="particle anthracite" style="--tx: 160px; --ty: -200px; --rot: 60deg; --dur: 4.1s; --del: 1.1s;" />
    <rect x="-5" y="-5" width="10" height="10" class="particle anthracite" style="--tx: -180px; --ty: -170px; --rot: -120deg; --dur: 3.4s; --del: 2.7s;" />
    <rect x="-4" y="-4" width="8" height="8" class="particle anthracite" style="--tx: 0px; --ty: -350px; --rot: 400deg; --dur: 4.6s; --del: 0.2s;" />

    <!-- Micro-circuits flottants -->
    <g class="particle" style="--tx: 100px; --ty: -130px; --rot: -20deg; --dur: 4.3s; --del: 0s;">
      <path d="M -15 0 L 0 15 L 20 15" class="circuit" />
      <circle cx="20" cy="15" r="4" class="anthracite" />
    </g>
    <g class="particle" style="--tx: -90px; --ty: -210px; --rot: 35deg; --dur: 3.9s; --del: 1.4s;">
      <path d="M 0 20 L 0 0 L 25 -10" class="circuit" />
      <circle cx="25" cy="-10" r="4" class="anthracite" />
    </g>
    <g class="particle" style="--tx: 50px; --ty: -280px; --rot: 180deg; --dur: 4.7s; --del: 2.0s;">
      <path d="M 10 10 L -10 -10 L -25 -10" class="circuit" />
      <circle cx="-25" cy="-10" r="4" class="anthracite" />
    </g>
    <g class="particle" style="--tx: -40px; --ty: -110px; --rot: -60deg; --dur: 3.0s; --del: 0.7s;">
      <path d="M -20 5 L -5 5 L 10 -10" class="circuit" />
      <circle cx="-20" cy="5" r="4" class="anthracite" />
    </g>

  </g> <!-- Fin du geyser -->

  <!-- TEXTE EDOXIA (Avec contours arrondis forcés) -->
  <text x="250" y="580" text-anchor="middle" class="anthracite font-edoxia" stroke="#2c2c3e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">Edoxia</text>

</svg>